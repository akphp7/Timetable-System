<!--
============================================================================
login.html — Login Page
============================================================================

WHAT THIS DOES:
Shows a centered login form with username and password fields.
When submitted, the form POSTs to the same URL (/login), which
is handled by the login() function in app.py.

KEY CONCEPTS:
- extends 'base.html' - Inherits the layout from base.html
- block content - Replaces the "content" block in base.html
- method="POST" - Form data is sent in the request body (not in the URL)
- required - Browser-level validation (won't submit if empty)
- autofocus - Cursor starts in the username field
============================================================================
-->

{% extends 'base.html' %} {% block title %}Login - Timetable System{% endblock
%} {% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-lg">
      <div class="card-body p-4">
        <!-- Logo and title -->
        <div class="text-center mb-4">
          <img
            src="{{ url_for('static', filename='nitr.jpeg') }}"
            alt="Logo"
            class="rounded-circle mb-3"
            style="width: 72px; height: 72px; object-fit: cover"
          />
          <h3 class="fw-bold" style="color: var(--primary)">
            Timetable System
          </h3>
          <p class="text-muted">Sign in to continue</p>
        </div>

        <!-- Login form -->
        <form method="POST">
          <div class="mb-3">
            <label for="username" class="form-label fw-medium">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user"></i></span>
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                placeholder="Enter username"
                required
                autofocus
              />
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-medium">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Enter password"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
