<!--
============================================================================
create_batch.html — Create New Batch Page
============================================================================

WHAT THIS DOES:
A simple form with one field: "Batch Name".
When submitted, it POSTs to the create_batch() route in app.py,
which creates a new Batch record in the database.

STRUCTURE:
- Centered card with a form
- Submit button + Back button
============================================================================
-->

{% extends 'base.html' %} {% block title %}Create Batch - Timetable System{%
endblock %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card">
      <div class="card-header bg-white border-0 pt-4 px-4">
        <h4 class="fw-bold mb-0" style="color: var(--primary)">
          <i class="fas fa-users me-2"></i>Create New Batch
        </h4>
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label for="name" class="form-label fw-medium">Batch Name</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              placeholder="e.g. B.Tech 2024 CSE"
              required
              autofocus
            />
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-plus-circle me-1"></i>Create Batch
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
              <i class="fas fa-arrow-left me-1"></i>Back
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
